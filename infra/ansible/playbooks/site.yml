---
- name: Configure Went Hiking preview host
  hosts: preview
  become: true
  vars:
    app_dir: /srv/went-hiking-2026
    swapfile_path: /swapfile
    swapfile_size: 1G

  tasks:
    - name: Install base packages
      ansible.builtin.apt:
        name:
          - docker.io
          - docker-compose-v2
          - git
          - ufw
        update_cache: true
        state: present

    - name: Enable Docker
      ansible.builtin.service:
        name: docker
        enabled: true
        state: started

    - name: Allow ubuntu to use Docker
      ansible.builtin.user:
        name: ubuntu
        groups: docker
        append: true

    - name: Create app directory
      ansible.builtin.file:
        path: "{{ app_dir }}"
        state: directory
        owner: ubuntu
        group: ubuntu
        mode: "0755"

    - name: Create swapfile if absent
      ansible.builtin.command:
        cmd: "fallocate -l {{ swapfile_size }} {{ swapfile_path }}"
        creates: "{{ swapfile_path }}"

    - name: Secure swapfile permissions
      ansible.builtin.file:
        path: "{{ swapfile_path }}"
        owner: root
        group: root
        mode: "0600"

    - name: Initialize swapfile
      ansible.builtin.command:
        cmd: "mkswap {{ swapfile_path }}"
      register: mkswap_result
      changed_when: "'setting up swapspace' in mkswap_result.stdout"
      failed_when:
        - mkswap_result.rc != 0
        - "'already set up' not in mkswap_result.stderr"

    - name: Enable swapfile
      ansible.builtin.command:
        cmd: "swapon {{ swapfile_path }}"
      register: swapon_result
      changed_when: swapon_result.rc == 0
      failed_when:
        - swapon_result.rc != 0
        - "'already active' not in swapon_result.stderr"

    - name: Persist swapfile
      ansible.builtin.lineinfile:
        path: /etc/fstab
        line: "{{ swapfile_path }} none swap sw 0 0"
        state: present

    - name: Allow SSH
      ansible.builtin.command:
        cmd: ufw allow OpenSSH
      changed_when: false

    - name: Allow HTTP
      ansible.builtin.command:
        cmd: ufw allow 80/tcp
      changed_when: false

    - name: Allow HTTPS
      ansible.builtin.command:
        cmd: ufw allow 443/tcp
      changed_when: false

    - name: Enable firewall
      ansible.builtin.command:
        cmd: ufw --force enable
      changed_when: false
